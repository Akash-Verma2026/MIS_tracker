<!DOCTYPE html>
<html>
<head>
  <title>Project Report</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f4f6fb;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      padding: 10px 15px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
      color: #666;
    }

    .card p {
      font-size: 28px;
      margin-top: 10px;
      font-weight: bold;
    }

    .good { color: #16a34a; }
    .medium { color: #f59e0b; }
    .bad { color: #dc2626; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    ul {
      padding-left: 18px;
    }

    canvas {
      max-height: 250px;
    }
  </style>
</head>

<body>
<div class="section">
  <h3>📌 Project Overview</h3>
  <p id="overview"></p>
</div>
<div class="container">

  <div class="top-bar">
    <h1>📊 Project Intelligence Report</h1>
    <button class="btn" onclick="downloadPDF()">Download PDF</button>
  </div>

  <!-- KPI CARDS -->
  <div class="cards">
    <div class="card">
      <h3>Health</h3>
      <p id="health"></p>
    </div>

    <div class="card">
      <h3>Risk</h3>
      <p id="risk"></p>
    </div>

    <div class="card">
      <h3>Score</h3>
      <p id="score"></p>
    </div>
  </div>

  <!-- CHART -->
  <div class="section">
    <h3>Performance Score</h3>
    <canvas id="chart"></canvas>
  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="section">
      <h3>⚠️ Key Issues</h3>
      <ul id="issues"></ul>
    </div>

    <div class="section">
      <h3>🧠 Insights</h3>
      <ul id="insights"></ul>
    </div>

    <div class="section">
      <h3>🚀 Recommendations</h3>
      <ul id="recommendations"></ul>
    </div>

    <div class="section">
      <h3>📌 Final Decision</h3>
      <p id="decision"></p>
    </div>
    <div class="section">
  <h3>🎯 Next Best Action</h3>
  <p id="nextAction"></p>
</div>

<div class="section">
  <h3>📄 Executive Summary</h3>
  <p id="summary"></p>
</div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
const data = JSON.parse(localStorage.getItem("reportData"))

// KPI
document.getElementById("health").innerText = data.health
document.getElementById("risk").innerText = data.risk
document.getElementById("score").innerText = data.score

// Color logic
if(data.score > 80){
  document.getElementById("score").classList.add("good")
}else if(data.score > 50){
  document.getElementById("score").classList.add("medium")
}else{
  document.getElementById("score").classList.add("bad")
}

// Lists
document.getElementById("issues").innerHTML =
  data.issues.map(i => `<li>${i}</li>`).join("")

document.getElementById("insights").innerHTML =
  data.insights.map(i => `<li>${i}</li>`).join("")

const safeArray = (val) => Array.isArray(val) ? val : (val ? [val] : []);

document.getElementById("recommendations").innerHTML =
  [
    ...safeArray(data.recommendations?.immediate),
    ...safeArray(data.recommendations?.shortTerm),
    ...safeArray(data.recommendations?.strategic)
  ].map(r => `<li>${r}</li>`).join("");

document.getElementById("decision").innerText = data.finalDecision

// Chart
new Chart(document.getElementById("chart"), {
  type: "doughnut",
  data: {
    labels: ["Score", "Remaining"],
    datasets: [{
      data: [data.score, 100 - data.score]
    }]
  },
  options: {
    plugins: {
      legend: { position: "bottom" }
    }
  }
})

// PDF download
function downloadPDF(){
  const element = document.querySelector(".container")
  html2pdf().from(element).save("Project_Report.pdf")
}
</script>

</body>
</html>
