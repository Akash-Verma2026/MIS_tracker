<!DOCTYPE html>
<html>

<head>

<title>Tsuyo R&D MIS Tracker</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo-area">
<img src="assets/tsuyo-logo.jpeg">
<h2>Tsuyo R&D MIS Tracker</h2> 
</div>

<div class="topbar">
<button id="addProjectBtn" onclick="openForm()">Add Project</button>
<button onclick="generateExcel()">Generate Excel</button>
<button onclick="logout()">Logout</button>
</div>

</header>


<div class="container">

<!-- DASHBOARD STATS -->

<div class="stats">

<div class="card">
<h3 id="customerProjects">0</h3>
<p>Customer Projects</p>
</div>

<div class="card">
<h3 id="rdProjects">0</h3>
<p>R&D Development</p>
</div>

<div class="card">
<h3 id="holdProjects">0</h3>
<p>On Hold</p>
</div>

<div class="card">
<h3 id="totalProjects">0</h3>
<p>Total Projects</p>
</div>

</div>


<!-- SEARCH -->
 
<div class="search-bar">
<!-- <input id="search" placeholder="Search project..."> -->
</div> 

<input type="text" id="searchInput" placeholder="Search by project, customer, leader, status, code..." class="search-input">


<!-- ADD PROJECT FORM -->

<div id="formOverlay">

<div id="projectForm">
<h3>Add Project</h3>

<div class="form-grid">

<input id="f_project_code" placeholder="Project Code">
<input id="f_ref_id" placeholder="Ref ID">
<input id="f_project_customer" placeholder="Project / Customer">
<select id="f_type">
<option value="">Select Type</option>
<option value="L1">L3</option>
<option value="L2">L5</option>
<option value="L3">N1</option>
<option value="L4">OFFROAD</option>
<option value="L4">RND</option>

</select>
<select id="f_category">
<option value="">Select Category</option>
<option value="Customer Projects">Customer Projects</option>
<option value="R&D Projects">R&D Projects</option>
<option value="On Hold">On Hold</option>
</select>
<input id="f_location" placeholder="Location">
<select id="f_business_potential">
<option value="">Select BusinessPotential</option>
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
<select id="f_level">
<option value="">Select Level</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>
<input id="f_project_brief" placeholder="Project Brief">

<!-- <select id="f_last_status"> -->

<!-- <option value="">Select Status</option>
<option value="Planning">Planning</option>
<option value="In Progress">In Progress</option>
<option value="On Hold">On Hold</option>
<option value="Completed">Completed</option> -->
<input type="text" id="f_last_status" placeholder="Enter last status" />

</select>

<input id="f_next_action_plan" placeholder="Next Action Plan">

<input id="f_project_leader" placeholder="Project Leader">
<input id="f_sub_leader" placeholder="Sub Leader">
<input id="f_members_roll_no" placeholder="Members Roll No">
<div class="form-buttons">
<button onclick="saveProject()">Save Project</button>
<button onclick="closeForm()">Cancel</button>
</div>
</div>

</div>

</div>


<div class="filters">
<button onclick="filterProjects('Customer')">Customer Projects</button>

<button onclick="filterProjects('R&D')">R&D Projects</button>

<button onclick="filterProjects('On Hold')">On Hold</button>

<button onclick="renderTable()">All</button>

<select id="leaderFilter">
<option value="all">All Leaders</option>
<option value="all">Akash</option>
<option value="all">jiya</option>
<option value="all">Kavita</option>
<option value="all">Mayank</option>
<option value="all">Nikhil</option>
<option value="all">Pawan</option>
<option value="all">Prateek</option>
<option value="all">Puranjan</option>
<option value="all">Sharmistha</option>
<option value="all">Suman</option>
<option value="all">Sweta</option>
</select>

<select id="potentialFilter">
<option value="all">All Potential</option>
<option value="H">High</option>
<option value="M">Medium</option>
<option value="L">Low</option>
</select>

<select id="typeFilter">
<option value="all">All Types</option>
<option value="L3">L3</option>
<option value="L5">L5</option>
<option value="N1">N1</option>
<option value="OFFROAD">OFFROAD</option>
<option value="RND">RND</option>
</select>

</div>
<!-- PROJECT TABLE -->

<div class="table-container">

<table id="projectTable">

<thead>

<tr>

<th>project_code</th>
<th>ref_id</th>
<th>project_customer</th>
<th>type</th>
<th>category</th>
<th>location</th>
<th>business_potential</th>
<th>level</th>
<th>project_brief</th>
<th>last_status</th>
<th>next_action_plan</th>
<th>project_leader</th>
<th>sub_leader</th>
<th>members_roll_no</th>
<th>updated_at</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
